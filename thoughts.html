<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading… — Dev Journal</title>
    <meta name="description" content="">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="post-body">

    <!-- Reading Progress Bar -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- ====== NAVIGATION ====== -->
    <nav class="nav" id="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand">
                <span class="nav-brand-icon">◆</span>
                Dev Journal
            </a>

            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#posts" class="nav-link">Posts</a>
            </div>

            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>

                <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                    <svg class="icon-menu" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                    <svg class="icon-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- ====== POST CONTENT ====== -->
    <main class="post-main">
        <article class="post-article" id="postArticle">
            <!-- Content injected by JavaScript -->

            <!-- Loading state (shown by default) -->
            <div class="post-loading" id="postLoading">
                <div class="skeleton-img skeleton-cover"></div>
                <div class="skeleton-post-body">
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line shorter"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>
            </div>

            <!-- Error state (hidden by default) -->
            <div class="post-error" id="postError" style="display:none;">
                <h2>Post not found</h2>
                <p>The post you're looking for doesn't exist or may have been moved.</p>
                <a href="index.html" class="hero-cta">← Back to all posts</a>
            </div>
        </article>
    </main>

    <!-- ====== FOOTER ====== -->
    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="nav-brand-icon">◆</span>
                Dev Journal
            </div>
            <p class="footer-copy">&copy; 2025 Dev Journal. Built with plain HTML, CSS &amp; JS.</p>
            <div class="footer-links">
                <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
                <a href="index.html">Home</a>
            </div>
        </div>
    </footer>

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"/>
        </svg>
    </button>

    <script src="script.js"></script>
</body>
</html>
