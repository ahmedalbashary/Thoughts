<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Ashraf</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">ModernBlog</a>
            <div class="nav-right">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                    <span class="sun">☀️</span>
                    <span class="moon">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="container">
            <h1 class="hero-title fade-in">Thoughts, Stories & Ideas</h1>
            <p class="hero-subtitle fade-in delay-1">A minimal blog built with vanilla JavaScript and modern CSS</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <div id="posts-grid" class="posts-grid">
            <!-- Posts will be injected here by JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 ModernBlog. Built for GitHub Pages.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
