<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Blog</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">ModernBlog</a>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 class="hero-title fade-in">Thoughts, Stories & Ideas</h1>
            <p class="hero-subtitle fade-in delay-1">A minimal blog built with vanilla JavaScript and modern CSS</p>
        </div>
    </header>

    <main class="container">
        <div id="posts-grid" class="posts-grid"></div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 ModernBlog. Built for GitHub Pages.</p>
        </div>
    </footer>

    <!-- Sticky Email Button -->
    <a href="mailto:ahmed.a.elbashary@gmail.com" class="sticky-email" aria-label="Send email">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>

    <script src="script.js"></script>

</html>
